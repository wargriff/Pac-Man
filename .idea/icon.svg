<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#0B1F3A"></rect>

  <!-- Definitions -->
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"></stop>
      <stop offset="100%" stop-color="#00CFFF"></stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#0B1F3A" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- Glow -->
  <circle cx="512" cy="512" r="350" fill="url(#glow)"></circle>

  <!-- Processor -->
  <rect x="312" y="312" width="400" height="400" rx="50" fill="url(#chipGrad)" stroke="#FFFFFF" stroke-width="6"></rect>

  <!-- Inner Core -->
  <rect x="372" y="372" width="280" height="280" rx="25" fill="#0D2B66" stroke="#00E5FF" stroke-width="4"></rect>

  <!-- Processor Pins -->
  <g fill="#FFFFFF">
    <!-- Top -->
    <rect x="400" y="270" width="20" height="40"></rect>
    <rect x="450" y="270" width="20" height="40"></rect>
    <rect x="500" y="270" width="20" height="40"></rect>
    <rect x="550" y="270" width="20" height="40"></rect>
    <rect x="600" y="270" width="20" height="40"></rect>

    <!-- Bottom -->
    <rect x="400" y="712" width="20" height="40"></rect>
    <rect x="450" y="712" width="20" height="40"></rect>
    <rect x="500" y="712" width="20" height="40"></rect>
    <rect x="550" y="712" width="20" height="40"></rect>
    <rect x="600" y="712" width="20" height="40"></rect>

    <!-- Left -->
    <rect x="270" y="400" width="40" height="20"></rect>
    <rect x="270" y="450" width="40" height="20"></rect>
    <rect x="270" y="500" width="40" height="20"></rect>
    <rect x="270" y="550" width="40" height="20"></rect>
    <rect x="270" y="600" width="40" height="20"></rect>

    <!-- Right -->
    <rect x="712" y="400" width="40" height="20"></rect>
    <rect x="712" y="450" width="40" height="20"></rect>
    <rect x="712" y="500" width="40" height="20"></rect>
    <rect x="712" y="550" width="40" height="20"></rect>
    <rect x="712" y="600" width="40" height="20"></rect>
  </g>

  <!-- Text -->
  <text x="512" y="480" text-anchor="middle" font-size="70" font-family="Segoe UI, Arial" font-weight="bold" fill="white">
    pycharm
  </text>

  <text x="512" y="580" text-anchor="middle" font-size="100" font-family="Segoe UI, Arial" font-weight="bold" fill="#00E5FF">
    3.12
  </text>

</svg>